upstream watchdog_metrics {
    server watchdog-metrics:8000;
}

server {
    listen 80;
    server_name _;

    location /metrics {
        proxy_pass http://watchdog_metrics/metrics;

        auth_basic           "Restricted Metrics";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health {
        proxy_pass http://watchdog_metrics/health;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

