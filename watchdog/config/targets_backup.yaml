# WatchDog hedef listesi (10 site)
# - 5 kamu | 2 kişisel | 3 negatif (çalışmayan / hata verecek)

targets:
  # ---------- 5 KAMU ----------
  - name: "Cumhurbaşkanlığı"
    url: "https://www.tccb.gov.tr/"
    expected_status: 200
    timeout: 8
    method: "GET"
    headers:
      User-Agent: "WatchDog/1.0"
    latency_threshold_ms: 5000

  - name: "NVI Randevu"
