[tool.ruff]
target-version = "py310"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "B"]
ignore = [
  "E501", # line length handled by formatter; avoid noisy diffs
  "B012", # existing control-flow pattern in monitor loop
  "B023", # existing pattern in monitor loop
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
